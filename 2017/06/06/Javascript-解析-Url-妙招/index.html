  <h1 class="post-title"> Javascript 解析 Url 妙招</h1>
  <section class="post-content article-entry">
    <p>今天项目遇到一个需求，需要把 A 标签链接中的 hash 部分取出来，于是想 google 下看看有没有还不知道的 js 函数，意外的在 <a href="https://gist.github.com/jlong/2428561" target="_blank" rel="noopener">github</a> 上 get 到一个巧妙 js 解析 url 的小技巧：</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">var</span> parser = <span class="built_in">document</span>.createElement(<span class="string">'a'</span>);</span><br><span class="line">parser.href = <span class="string">"http://example.com:3000/pathname/?search=test#hash"</span>;</span><br><span class="line"></span><br><span class="line">parser.protocol; <span class="comment">// =&gt; "http:"</span></span><br><span class="line">parser.hostname; <span class="comment">// =&gt; "example.com"</span></span><br><span class="line">parser.port;     <span class="comment">// =&gt; "3000"</span></span><br><span class="line">parser.pathname; <span class="comment">// =&gt; "/pathname/"</span></span><br><span class="line">parser.search;   <span class="comment">// =&gt; "?search=test"</span></span><br><span class="line">parser.hash;     <span class="comment">// =&gt; "#hash"</span></span><br><span class="line">parser.host;     <span class="comment">// =&gt; "example.com:3000"</span></span><br><span class="line"></span><br><span class="line"><span class="comment">// 也就是说只要获取到 dom 即可获取解析后的 url 信息</span></span><br><span class="line"><span class="built_in">document</span>.querySelector(<span class="string">'#logo a'</span>).hash;     <span class="comment">// =&gt; '#logo'</span></span><br></pre></td></tr></table></figure>

  </section>
